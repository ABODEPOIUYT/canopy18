<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lala Restaurant</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

input, button {
  padding: 10px;
  margin: 5px;
}

section {
  margin: 30px;
  padding: 20px;
  border: 1px solid #333;
}
</style>
</head>

<body>

<h1>🍽️ Lala Restaurant</h1>

<section>
<h2>Register / Login</h2>
<input id="email" placeholder="Email">
<input id="password" placeholder="Password">
<br>
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
<p id="user"></p>
</section>

<section>
<h2>Book Table</h2>
<input id="name" placeholder="Name">
<input id="date" type="date">
<button onclick="book()">Reserve</button>
<p id="msg"></p>
</section>

<section>
<h2>Chat</h2>
<input id="chatMsg" placeholder="Message">
<button onclick="sendMsg()">Send</button>
<div id="chat"></div>
</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, addDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔴 ضع بياناتك هنا
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// REGISTER
window.register = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  await createUserWithEmailAndPassword(auth, email, pass);
  alert("Registered!");
};

// LOGIN
window.login = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  const user = await signInWithEmailAndPassword(auth, email, pass);
  document.getElementById("user").innerText = "Logged in: " + user.user.email;
};

// BOOKING
window.book = async () => {
  const name = document.getElementById("name").value;
  const date = document.getElementById("date").value;

  await addDoc(collection(db, "bookings"), {
    name,
    date
  });

  document.getElementById("msg").innerText = "✅ Booked!";
};

// CHAT
window.sendMsg = async () => {
  const msg = document.getElementById("chatMsg").value;

  await addDoc(collection(db, "chat"), {
    msg,
    time: Date.now()
  });
};

// REALTIME CHAT
onSnapshot(collection(db, "chat"), (snapshot) => {
  const chatDiv = document.getElementById("chat");
  chatDiv.innerHTML = "";

  snapshot.forEach(doc => {
    const p = document.createElement("p");
    p.textContent = doc.data().msg;
    chatDiv.appendChild(p);
  });
});

</script>

</body>
</html>
